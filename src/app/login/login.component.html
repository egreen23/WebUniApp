<div class="card mt-5" style="margin:auto;width: 600px;">
  <div class="card-body">
    <h5 class="card-title">Login</h5>
    <div class="form-group">
      <label for="idMatricola">Matricola</label>
      <input type="text" class="form-control" id="idMatricola"  [(ngModel)]="user.idMatricola">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" class="form-control" id="password" [(ngModel)]="user.password">
    </div>

    <!--<a routerLink="/home">--> <button type="submit" class="btn btn-primary" (click)="tryLogin()"> Login</button><!--</a>-->
  </div>

</div>

<div *ngIf="user">

  <h2>{{user.nome | uppercase}} Details</h2>
  <div><span>id: </span>{{user.nome}}</div>
</div>
